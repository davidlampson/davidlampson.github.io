<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tango Nights — A Podcast by Tango Man</title>
  <meta name="description" content="Ride along with Tango Man as he navigates the ups and downs of the social tango scene.">
  <link rel="icon" type="image/png" href="https://artwork.captivate.fm/a170263d-db3f-4810-a16d-2717a23d9b5a/Untitled-design-4.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #0b0806;
      --bg2:       #130e0a;
      --red:       #9b2335;
      --red-glow:  rgba(155, 35, 53, 0.25);
      --gold:      #c9a55a;
      --gold-dim:  rgba(201, 165, 90, 0.15);
      --text:      #f0e6d3;
      --text-dim:  #8a7a6a;
      --rule:      rgba(201, 165, 90, 0.2);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 180px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* Ambient glow behind artwork */
    .glow-orb {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(155,35,53,0.18) 0%, transparent 70%);
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      filter: blur(40px);
    }

    /* ─── Layout ─── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }

    /* ─── Hero ─── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-top: 2rem;
      position: relative;
    }

    .artwork-wrap {
      position: relative;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.9s ease both;
    }

    .artwork-wrap::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 22px;
      background: var(--red-glow);
      filter: blur(20px);
      z-index: -1;
    }

    .artwork {
      width: 200px;
      height: 200px;
      border-radius: 16px;
      object-fit: cover;
      display: block;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    }

    .show-label {
      font-family: 'Raleway', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.75rem;
      animation: fadeUp 0.9s 0.1s ease both;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 1.25rem;
      animation: fadeUp 0.9s 0.15s ease both;
    }

    h1 em {
      font-style: italic;
      color: var(--red);
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-style: italic;
      font-weight: 300;
      color: var(--text-dim);
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.9s 0.2s ease both;
    }

    /* ─── Listen buttons ─── */
    .listen-group {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1rem;
      animation: fadeUp 0.9s 0.3s ease both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.6rem;
      border-radius: 3px;
      font-family: 'Raleway', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--red);
      color: var(--text);
      border: 2px solid var(--red);
    }
    .btn-primary:hover {
      background: transparent;
      color: var(--red);
    }

    .btn-outline {
      background: transparent;
      color: var(--gold);
      border: 2px solid var(--rule);
    }
    .btn-outline:hover {
      border-color: var(--gold);
      background: var(--gold-dim);
    }

    /* ─── Divider ─── */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 3rem 0;
      animation: fadeUp 0.9s 0.35s ease both;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }
    .divider-mark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: var(--gold);
      opacity: 0.6;
      letter-spacing: 0.2em;
    }

    /* ─── Player ─── */
    .player-section {
      animation: fadeUp 0.9s 0.4s ease both;
    }

    .section-title {
      font-family: 'Raleway', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.25rem;
      text-align: left;
    }

    .spotify-wrap {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* ─── Social ─── */
    .social-section {
      animation: fadeUp 0.9s 0.5s ease both;
    }

    .social-links {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.1rem;
      border: 1px solid var(--rule);
      border-radius: 3px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      transition: all 0.2s ease;
    }
    .social-link:hover {
      color: var(--text);
      border-color: var(--text-dim);
      background: rgba(255,255,255,0.04);
    }

    /* ─── Footer ─── */
    .footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--rule);
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      animation: fadeUp 0.9s 0.55s ease both;
    }

    /* ─── Animations ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Mobile ─── */
    @media (max-width: 480px) {
      .page { padding: 2.5rem 1.25rem 4rem; }
      .artwork { width: 160px; height: 160px; }
      .listen-group { gap: 0.5rem; }
      .btn { padding: 0.65rem 1.2rem; font-size: 0.75rem; }
    }
  </style>
</head>
