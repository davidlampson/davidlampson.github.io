  <style>
    :root {
      --bg:        #0b0806;
      --bg2:       #130e0a;
      --red:       #9b2335;
      --red-glow:  rgba(155, 35, 53, 0.25);
      --gold:      #c9a55a;
      --gold-dim:  rgba(201, 165, 90, 0.15);
      --text:      #f0e6d3;
      --text-dim:  #8a7a6a;
      --rule:      rgba(201, 165, 90, 0.2);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 180px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* Ambient glow behind artwork */
    .glow-orb {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(155,35,53,0.18) 0%, transparent 70%);
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      filter: blur(40px);
    }

    /* ─── Layout ─── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }

    /* ─── Hero ─── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-top: 2rem;
      position: relative;
    }

    .artwork-wrap {
      position: relative;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.9s ease both;
    }

    .artwork-wrap::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 22px;
      background: var(--red-glow);
      filter: blur(20px);
      z-index: -1;
    }

    .artwork {
      width: min(360px, 82vw);
      height: min(360px, 82vw);
      border-radius: 18px;
      object-fit: cover;
      display: block;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 1.25rem;
      animation: fadeUp 0.9s 0.15s ease both;
    }

    h1 em {
      font-style: italic;
      color: var(--red);
    }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-style: italic;
      font-weight: 300;
      color: var(--text-dim);
      max-width: 420px;
      line-height: 1.6;
      margin-bottom: 0;
      animation: fadeUp 0.9s 0.2s ease both;
    }

    /* ─── Section labels ─── */
    .section-title {
      font-family: 'Raleway', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.25rem;
    }
    .section-title--left { text-align: left; }
    .section-title--center { text-align: center; }

    /* ─── Player ─── */
    .player-section {
      animation: fadeUp 0.9s 0.3s ease both;
    }

    .episodes-list {
      border-top: 1px solid var(--rule);
    }

    .episode-row {
      border-bottom: 1px solid var(--rule);
    }

    .episode-header {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 1.1rem 0.5rem;
      cursor: pointer;
      transition: background 0.2s ease;
      text-align: left;
    }
    .episode-header:hover {
      background: rgba(255, 255, 255, 0.025);
    }

    .episode-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-style: italic;
      color: var(--gold);
      min-width: 1.5rem;
      text-align: center;
      opacity: 0.7;
    }

    .episode-info {
      flex: 1;
      min-width: 0;
    }

    .episode-title {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.2rem;
      line-height: 1.35;
    }

    .episode-meta {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .episode-toggle {
      color: var(--gold);
      font-size: 0.9rem;
      flex-shrink: 0;
      opacity: 0.6;
      transition: transform 0.35s ease, opacity 0.2s ease;
      width: 16px;
      text-align: center;
    }
    .episode-header:hover .episode-toggle { opacity: 1; }
    .episode-row.open .episode-toggle {
      transform: rotate(45deg);
      opacity: 1;
    }

    .episode-expand {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .episode-row.open .episode-expand {
      max-height: 600px;
    }

    .episode-expand-inner {
      padding: 0 0.5rem 1.5rem 3.25rem;
    }

    .episode-description {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.02rem;
      font-weight: 300;
      color: var(--text-dim);
      line-height: 1.55;
      margin-bottom: 1.25rem;
      text-align: left;
    }

    /* ─── Custom audio player ─── */
    .audio-player {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.6rem 0.85rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--rule);
      border-radius: 4px;
    }

    .audio-play {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--red);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.7rem;
      padding-left: 2px;
      transition: background 0.2s ease, transform 0.1s ease;
    }
    .audio-play:hover { background: #b32a3f; }
    .audio-play:active { transform: scale(0.95); }

    .audio-progress {
      flex: 1;
      height: 3px;
      background: rgba(201, 165, 90, 0.2);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .audio-progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0;
      background: var(--gold);
      transition: width 0.1s linear;
    }

    .audio-time {
      font-family: 'Raleway', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
      min-width: 75px;
      text-align: right;
    }

    .episodes-status {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-dim);
      font-size: 0.85rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
    }

    /* ─── Subscribe buttons ─── */
    .subscribe-section {
      animation: fadeUp 0.9s 0.4s ease both;
      text-align: center;
    }

    .listen-group {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.6rem;
      border-radius: 3px;
      font-family: 'Raleway', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--red);
      color: var(--text);
      border: 2px solid var(--red);
    }
    .btn-primary:hover {
      background: transparent;
      color: var(--red);
    }

    .btn-outline {
      background: transparent;
      color: var(--gold);
      border: 2px solid var(--rule);
    }
    .btn-outline:hover {
      border-color: var(--gold);
      background: var(--gold-dim);
    }

    /* ─── Divider ─── */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 3rem 0;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }
    .divider-mark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: var(--gold);
      opacity: 0.6;
      letter-spacing: 0.2em;
    }

    /* ─── Social ─── */
    .social-section {
      animation: fadeUp 0.9s 0.5s ease both;
      text-align: center;
    }

    .social-links {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.1rem;
      border: 1px solid var(--rule);
      border-radius: 3px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      transition: all 0.2s ease;
    }
    .social-link:hover {
      color: var(--text);
      border-color: var(--text-dim);
      background: rgba(255,255,255,0.04);
    }

    /* ─── Footer ─── */
    .footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--rule);
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      animation: fadeUp 0.9s 0.55s ease both;
    }

    /* ─── Animations ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Respect users who prefer reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-delay: 0ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ─── Mobile ─── */
    @media (max-width: 480px) {
      .page { padding: 2.5rem 1.25rem 4rem; }
      .artwork { width: min(300px, 82vw); height: min(300px, 82vw); }
      .listen-group { gap: 0.5rem; }
      .btn { padding: 0.65rem 1.2rem; font-size: 0.75rem; }
    }
  </style>
</head>

<!-- Fetch all episodes from Apple Podcasts and render oldest-first. Audio plays only when the visitor clicks play. -->
<script>
  (function() {
    var APPLE_ID = '1879420453';
    var url = 'https://itunes.apple.com/lookup?id=' + APPLE_ID + '&media=podcast&entity=podcastEpisode&limit=200';
    var list = document.getElementById('episodes-list');

    function formatTime(sec) {
      if (!sec || isNaN(sec)) return '0:00';
      var m = Math.floor(sec / 60);
      var s = Math.floor(sec % 60);
      return m + ':' + (s < 10 ? '0' : '') + s;
    }

    function el(tag, className, textContent) {
      var node = document.createElement(tag);
      if (className) node.className = className;
      if (textContent != null) node.textContent = textContent;
      return node;
    }

    function buildEpisode(ep, i) {
      var d = new Date(ep.releaseDate);
      var date = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      var mins = ep.trackTimeMillis ? Math.round(ep.trackTimeMillis / 60000) + ' min' : '';
      var num = String(i + 1).padStart(2, '0');
      var title = ep.trackName || 'Episode';

      var rawDesc = ep.description || ep.shortDescription || '';
      var cleanDesc = rawDesc.replace(/<[^>]+>/g, '').trim();
      var desc = cleanDesc.length > 320 ? cleanDesc.substring(0, 320).trim() + '…' : cleanDesc;

      var row = el('div', 'episode-row');
      var header = el('div', 'episode-header');

      header.appendChild(el('span', 'episode-number', num));

      var info = el('div', 'episode-info');
      info.appendChild(el('div', 'episode-title', title));

      var metaEl = el('div', 'episode-meta');
      metaEl.textContent = mins ? (date + '  ·  ' + mins) : date;
      info.appendChild(metaEl);
      header.appendChild(info);

      header.appendChild(el('span', 'episode-toggle', '+'));
      row.appendChild(header);

      var expand = el('div', 'episode-expand');
      var inner = el('div', 'episode-expand-inner');

      if (desc) inner.appendChild(el('p', 'episode-description', desc));

      if (ep.episodeUrl) {
        var player = el('div', 'audio-player');
        player.setAttribute('data-title', title);

        var btn = document.createElement('button');
        btn.className = 'audio-play';
        btn.type = 'button';
        btn.setAttribute('aria-label', 'Play episode');
        btn.innerHTML = '&#9654;';
        player.appendChild(btn);

        var prog = el('div', 'audio-progress');
        prog.appendChild(el('div', 'audio-progress-bar'));
        player.appendChild(prog);

        player.appendChild(el('span', 'audio-time', '0:00 / 0:00'));

        var audio = document.createElement('audio');
        // First episode preloads audio so autoplay starts without a buffering pause
        audio.preload = i === 0 ? 'auto' : 'none';
        audio.src = ep.episodeUrl;
        player.appendChild(audio);

        inner.appendChild(player);
      }

      expand.appendChild(inner);
      row.appendChild(expand);
      return row;
    }

    fetch(url)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var episodes = (data.results || []).filter(function(r) {
          return r.kind === 'podcast-episode' || r.wrapperType === 'podcastEpisode';
        });

        // Sort oldest-first (chronological) so Episode 01 is the very first
        episodes.sort(function(a, b) {
          return new Date(a.releaseDate) - new Date(b.releaseDate);
        });

        if (!episodes.length) {
          list.textContent = '';
          list.appendChild(el('div', 'episodes-status', 'New episodes coming soon.'));
          return;
        }

        list.textContent = '';
        episodes.forEach(function(ep, i) {
          list.appendChild(buildEpisode(ep, i));
        });

        // Expand/collapse rows
        list.querySelectorAll('.episode-header').forEach(function(header) {
          header.addEventListener('click', function() {
            var row = this.parentElement;
            var wasOpen = row.classList.contains('open');
            list.querySelectorAll('.episode-row.open').forEach(function(r) {
              if (r !== row) {
                r.classList.remove('open');
                var a = r.querySelector('audio');
                if (a) a.pause();
              }
            });
            row.classList.toggle('open', !wasOpen);
          });
        });

        // Custom audio players
        list.querySelectorAll('.audio-player').forEach(function(player) {
          var audio = player.querySelector('audio');
          var btn = player.querySelector('.audio-play');
          var bar = player.querySelector('.audio-progress-bar');
          var progress = player.querySelector('.audio-progress');
          var timeEl = player.querySelector('.audio-time');
          var fired = false;

          btn.addEventListener('click', function() {
            document.querySelectorAll('audio').forEach(function(a) {
              if (a !== audio && !a.paused) a.pause();
            });
            if (audio.paused) audio.play();
            else audio.pause();
          });

          audio.addEventListener('play', function() {
            btn.innerHTML = '&#10074;&#10074;';
            btn.style.paddingLeft = '0';
            btn.setAttribute('aria-label', 'Pause episode');
            // Track the first play per episode as engagement, not a conversion
            if (!fired && typeof fbq !== 'undefined') {
              fbq('track', 'ViewContent', {
                content_name: player.getAttribute('data-title'),
                content_category: 'Episode play'
              });
              fired = true;
            }
          });

          audio.addEventListener('pause', function() {
            btn.innerHTML = '&#9654;';
            btn.style.paddingLeft = '2px';
            btn.setAttribute('aria-label', 'Play episode');
          });

          audio.addEventListener('timeupdate', function() {
            var pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
            bar.style.width = pct + '%';
            timeEl.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
          });

          audio.addEventListener('loadedmetadata', function() {
            timeEl.textContent = '0:00 / ' + formatTime(audio.duration);
          });

          progress.addEventListener('click', function(e) {
            if (!audio.duration) return;
            var rect = progress.getBoundingClientRect();
            var pct = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pct * audio.duration;
          });
        });

        // ── Auto-open the first (oldest) episode, but do not autoplay ──
        var firstRow = list.querySelector('.episode-row');
        if (firstRow) {
          firstRow.classList.add('open');
        }
      })
      .catch(function() {
        list.textContent = '';
        list.appendChild(el('div', 'episodes-status', 'Find the latest episodes on Apple Podcasts, Spotify, Substack, or all platforms below.'));
      });
  })();
</script>

<!-- Conversion tracking: fire platform-specific Meta Pixel events for listen button clicks -->
<script>
  document.querySelectorAll('.listen-group a[data-platform]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      if (typeof fbq !== 'undefined') {
        var platform = btn.getAttribute('data-platform');

        if (platform === 'Substack') {
          fbq('track', 'Lead', { content_name: 'Substack' });
        } else if (platform === 'YouTube') {
          fbq('track', 'ViewContent', { content_name: 'YouTube' });
        } else {
          fbq('track', 'Subscribe', { content_name: platform });
        }
      }
    });
  });
</script>
