<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tango Nights — with Tango Man</title>
    <meta name="description" content="Ride along with Tango Man as he navigates the ups and downs of the social tango scene.">
    <link rel="icon" type="image/png" href="https://artwork.captivate.fm/a170263d-db3f-4810-a16d-2717a23d9b5a/Untitled-design-4.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: #f0e6d3;
            min-height: 100vh;
        }
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
            background: radial-gradient(ellipse at center, #1a0a0a 0%, #0a0a0a 70%);
        }
        .artwork {
            width: 250px;
            height: 250px;
            border-radius: 16px;
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px rgba(230, 57, 70, 0.3);
            object-fit: cover;
        }
        h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.3rem;
            color: #e63946;
        }
        .subtitle {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: #c9a96e;
            margin-bottom: 1.5rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .description {
            max-width: 550px;
            font-size: 1.15rem;
            line-height: 1.7;
            color: #b0a090;
            margin-bottom: 2.5rem;
        }
        .listen-links {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }
        .listen-links a {
            display: inline-block;
            padding: 0.8rem 1.8rem;
            border: 2px solid #e63946;
            color: #e63946;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
        }
        .listen-links a:hover {
            background: #e63946;
            color: #0a0a0a;
        }
        .social-links {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-top: 2.5rem;
        }
        .social-links a {
            display: inline-block;
            padding: 0.8rem 1.8rem;
            border: 2px solid #c9a96e;
            color: #c9a96e;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
        }
        .social-links a:hover {
            background: #c9a96e;
            color: #0a0a0a;
        }
    </style>
</head>
<body>
    <section class="hero">
        <img class="artwork" src="https://artwork.captivate.fm/a170263d-db3f-4810-a16d-2717a23d9b5a/Untitled-design-4.png" alt="Tango Nights Podcast Artwork">
        <h1>Tango Nights</h1>
        <p class="subtitle">A Podcast by Tango Man</p>
        <p class="description">Ride along with Tango Man as he navigates the ups and downs of the social tango scene.</p>
        <div class="listen-links">
            <a href="https://podcasts.apple.com/us/podcast/tango-nights/id1879420453">Apple Podcasts</a>
            <a href="https://open.spotify.com/show/2MZ9EGC4IME2AKLS4CQVuk">Spotify</a>
        </div>
        <div class="social-links">
            <a href="https://www.instagram.com/tango.nights">📸 Instagram</a>
            <a href="https://www.tiktok.com/@tango.nights">🎵 TikTok</a>
            <a href="mailto:tangoman@tangonights.com">📧 Email</a>
        </div>
    </section>
</body>
</html>
